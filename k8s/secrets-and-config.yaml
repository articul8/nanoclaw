# a8-claw Secrets and ConfigMaps
---
apiVersion: v1
kind: Secret
metadata:
  name: a8-claw-secrets
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
type: Opaque
data:
  anthropic-api-key: ""
  # Channel-specific secrets (optional)
  # telegram-bot-token: ""
  # slack-bot-token: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: a8-claw-config
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
data:
  nanoclaw-port: "3000"
  claude-model: "claude-sonnet-4-6"
  session-timeout-ms: "3600000"  # 1 hour for chat (longer than code sessions)
  health-port: "8040"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: a8-claw-skills
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
data:
  # Platform skills installed by default in every a8-claw session.
  # These are OpenClaw-format skills that wrap Warp SDK calls.
  installed-skills: |
    @agentmesh/graph-query
    @agentmesh/perception-scan
    @agentmesh/domain-pack
    @agentmesh/file-upload
    @agentmesh/memory
    @agentmesh/graph-explore
    @agentmesh/tool-execute
    @agentmesh/session-manage
    @agentmesh/insights
    @agentmesh/federated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: a8-claw-sa
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: a8-claw-role
  namespace: aks-agentmesh-apps
rules: []  # Empty — a8-claw has NO K8s API permissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: a8-claw-rolebinding
  namespace: aks-agentmesh-apps
subjects:
  - kind: ServiceAccount
    name: a8-claw-sa
    namespace: aks-agentmesh-apps
roleRef:
  kind: Role
  name: a8-claw-role
  apiGroup: rbac.authorization.k8s.io
