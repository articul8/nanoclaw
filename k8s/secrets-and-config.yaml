# a8-claw Secrets, ConfigMaps, and RBAC
#
# The Secret resource is reserved for channel-adapter tokens (Slack,
# Telegram, Discord, etc.) — populated by the operator per tenant.
# Anthropic API keys are intentionally absent: all inference routes
# through Model Manager (RUNTIME_CONTRACT_20260505.md §7), and
# api.anthropic.com is blocked at the layered defense (no key, runtime
# egress allowlist, ANTHROPIC_BASE_URL pointed at Model Manager).
---
apiVersion: v1
kind: Secret
metadata:
  name: a8-claw-secrets
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
type: Opaque
data:
  # Channel-adapter tokens — populated per-tenant by the operator.
  # NEVER add an anthropic-api-key here; inference goes through Model Manager.
  # telegram-bot-token: ""
  # slack-bot-token: ""
  # discord-bot-token: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: a8-claw-config
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
data:
  # ── Platform service URLs ─────────────────────────────────────────
  # Cluster-internal addresses; sandbox-template.yaml exposes these as
  # WARP_URL / MODEL_MANAGER_URL / TOOL_MANAGER_URL / RABBITMQ_URL pod
  # envs. The runtime auth wrapper (src/auth/tenant-context.ts) reads
  # these and injects X-Tenant-ID + X-User-ID on every outbound call.
  warp-url: "http://aks-warp-service.aks-warp-apps.svc.cluster.local:8085"
  model-manager-url: "http://aks-model-manager.aks-agentmesh-apps.svc.cluster.local:8000"
  tool-manager-url: "http://aks-tool-manager.aks-tool-manager-apps.svc.cluster.local:8080"
  # RabbitMQ for mission-queue + per-mission bus topics. Used by the
  # mission-queue channel adapter (Phase 9). Operator confirms cluster URL.
  rabbitmq-url: "amqp://aks-rabbitmq.aks-rabbitmq-apps.svc.cluster.local:5672"

  # ── Default chat model NAME (resolved to UUID at session spawn) ───
  # Runtime POSTs to {MODEL_MANAGER_URL}/resolve with this name to get
  # the endpoint UUID, then sets ANTHROPIC_BASE_URL =
  # {MODEL_MANAGER_URL}/run/{uuid}. Hardcoded UUIDs are forbidden — they
  # differ per environment.
  default-llm-model: "claude-sonnet-4-6"

  # ── nanoclaw runtime config ───────────────────────────────────────
  nanoclaw-port: "3000"
  health-port: "8040"
  session-timeout-ms: "3600000"  # 1 hour for chat sessions
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: a8-claw-skills
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
data:
  # Platform skills installed by default in every a8-claw session.
  # These are nanoclaw-format skills that wrap Warp SDK calls. Note: many
  # of these overlap with what Tool Manager MCP auto-loads (the 23
  # perception tools); a side-by-side review in Phase 5 will decide
  # which to keep, prune, or replace with Tool Manager MCP equivalents.
  installed-skills: |
    @agentmesh/graph-query
    @agentmesh/perception-scan
    @agentmesh/domain-pack
    @agentmesh/file-upload
    @agentmesh/memory
    @agentmesh/graph-explore
    @agentmesh/tool-execute
    @agentmesh/session-manage
    @agentmesh/insights
    @agentmesh/federated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: a8-claw-sa
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: a8-claw-role
  namespace: aks-agentmesh-apps
rules: []  # Empty — a8-claw has NO K8s API permissions (gVisor + zero RBAC)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: a8-claw-rolebinding
  namespace: aks-agentmesh-apps
subjects:
  - kind: ServiceAccount
    name: a8-claw-sa
    namespace: aks-agentmesh-apps
roleRef:
  kind: Role
  name: a8-claw-role
  apiGroup: rbac.authorization.k8s.io
