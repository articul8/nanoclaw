# a8-claw SandboxTemplate — Kubernetes Agent Sandbox
#
# nanoclaw (forked at articul8/nanoclaw, host process at /app/dist/index.js)
# running inside gVisor-isolated pods. Each session gets its own ephemeral
# container; durable state (episodes, semantic memory, graph entities,
# audit ledger) lives in Warp — see the fork's CLAUDE.md "Storage
# architecture" section. Tier-sized scratch is introduced in Phase 8
# (claw-tiny / small / medium / large / xl).
#
# Inference NEVER bypasses Model Manager. No Anthropic API key in env;
# the SDK is configured with ANTHROPIC_BASE_URL set per-session by the
# host based on Model Manager's /resolve response. api.anthropic.com is
# blocked at the NetworkPolicy layer (k8s/network-policy.yaml).
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: a8-claw-template
  namespace: aks-agentmesh-apps
  labels:
    agentmesh.io/agent-type: a8-claw
    agentmesh.io/component: sandbox-template
spec:
  template:
    spec:
      runtimeClassName: gvisor

      nodeSelector:
        kubernetes.io/arch: amd64

      serviceAccountName: a8-claw-sa

      containers:
        - name: a8-claw
          image: 641727684734.dkr.ecr.us-west-2.amazonaws.com/a8-claw:latest
          ports:
            - containerPort: 8040
              name: health
            - containerPort: 3000
              name: nanoclaw

          env:
            # ── Tenant context ─────────────────────────────────────
            # Populated per-pod by the warm-pool allocator at scheduling
            # time. The runtime injects them into every outbound HTTP call
            # via src/auth/tenant-context.ts. Tenant-only scoping is a
            # security breach — both must be set, both must be non-empty.
            - name: TENANT_ID
              value: ""    # MUST be overridden per-pod
            - name: USER_ID
              value: ""    # MUST be overridden per-pod

            # ── Platform service URLs (from configmap) ─────────────
            - name: WARP_URL
              valueFrom:
                configMapKeyRef:
                  name: a8-claw-config
                  key: warp-url
            - name: MODEL_MANAGER_URL
              valueFrom:
                configMapKeyRef:
                  name: a8-claw-config
                  key: model-manager-url
            - name: TOOL_MANAGER_URL
              valueFrom:
                configMapKeyRef:
                  name: a8-claw-config
                  key: tool-manager-url
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: a8-claw-config
                  key: rabbitmq-url

            # ── Default chat model (resolved at session spawn) ─────
            # The model NAME comes from configmap; the runtime resolves
            # ANTHROPIC_BASE_URL based on MAIN_MODEL_ROUTE (see below).
            # Hardcoded UUIDs are forbidden (they differ per env).
            - name: DEFAULT_LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: a8-claw-config
                  key: default-llm-model

            # ── Main-model routing (contract v1.1 §7.1) ────────────
            # "direct" (default for a8-claw) → ANTHROPIC_BASE_URL =
            #   https://api.anthropic.com; ANTHROPIC_API_KEY required;
            #   runtime self-reports metering after each call.
            # "model_manager" → ANTHROPIC_BASE_URL =
            #   ${MODEL_MANAGER_URL}/run/${uuid} resolved at session spawn;
            #   no API key needed; Model Manager auto-meters.
            # All OTHER model calls route through Model Manager regardless.
            - name: MAIN_MODEL_ROUTE
              valueFrom:
                configMapKeyRef:
                  name: a8-claw-config
                  key: main-model-route

            # ── Main-model API key (only used when MAIN_MODEL_ROUTE=direct) ─
            # In production, this key is resolved at session spawn from the
            # platform credential service / vault (per-tenant + per-user BYOK).
            # The K8s Secret slot below is the BOOTSTRAP / single-tenant fallback —
            # operator populates it per tenant deploy until vault integration
            # ships (post-v1). When MAIN_MODEL_ROUTE=model_manager this env is
            # ignored. The Secret allows empty values, so an unpopulated key is
            # not a pod-start failure — the runtime fails clearly at session
            # spawn if direct mode is set without a resolvable key.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: a8-claw-secrets
                  key: anthropic-api-key
                  optional: true

            # ── nanoclaw runtime config ────────────────────────────
            - name: NANOCLAW_PORT
              value: "3000"
            - name: NANOCLAW_SKILLS_DIR
              value: "/app/skills"

          resources:
            # v1 baseline — equivalent to claw-medium (Phase 8 introduces
            # the full tier matrix tiny/small/medium/large/xl).
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"

          volumeMounts:
            # Ephemeral scratch — nanoclaw's session SQLite DBs, file
            # uploads, working files. Dies with the container. Durable
            # platform state lives in Warp.
            - name: session-data
              mountPath: /workspace
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: skills
              mountPath: /app/skills
              readOnly: true

          livenessProbe:
            httpGet:
              path: /health
              port: 8040
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /health
              port: 8040
            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      volumes:
        # Ephemeral. sizeLimit becomes per-tier in Phase 8 (5Gi here is
        # the medium-tier baseline; emptyDir was previously a 5Gi EFS PVC
        # which violated the storage-via-Warp principle — see fork CLAUDE.md).
        - name: session-data
          emptyDir:
            sizeLimit: 5Gi

        - name: config
          configMap:
            name: a8-claw-config

        - name: skills
          configMap:
            name: a8-claw-skills

      terminationGracePeriodSeconds: 15
